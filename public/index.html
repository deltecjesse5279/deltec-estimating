<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deltec Estimating</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a18;font-size:14px;line-height:1.5}
:root{--border:#d8d6ce;--bg:#fff;--bg2:#f5f4f0;--bg3:#eeecea;--text:#1a1a18;--muted:#6b6a66;--accent:#1a1a18;--green:#2d6b1f;--green-bg:#eaf3de;--amber:#b87a10;--amber-bg:#faeeda;--danger:#a32d2d;--danger-bg:#fcebeb;--radius:8px}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.logo{font-size:15px;font-weight:600;letter-spacing:-0.3px;white-space:nowrap}
.logo span{font-weight:400;color:var(--muted)}
.proj-fields{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.proj-fields input{flex:1;min-width:120px;font-size:13px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text)}
.proj-fields input:focus{outline:none;border-color:#888;background:#fff}
.topbar-actions{display:flex;gap:6px;align-items:center}
.btn{font-size:12px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text);cursor:pointer;white-space:nowrap;transition:background .1s}
.btn:hover{background:var(--bg2)}
.btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn.primary:hover{opacity:.85}
.btn.success{background:var(--green);color:#fff;border-color:var(--green)}
.btn.success:hover{opacity:.85}
.btn.danger{color:var(--danger);border-color:var(--danger)}
.btn.danger:hover{background:var(--danger-bg)}
.btn.sm{font-size:11px;padding:3px 8px}
.tabs{display:flex;border-bottom:1px solid var(--border);background:#fff;padding:0 20px}
.tab{padding:9px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;color:var(--muted);user-select:none}
.tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}
.pane{display:none;padding:16px 20px;flex-direction:column;gap:12px}
.pane.active{display:flex}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.toolbar select,.toolbar input{font-size:13px;padding:5px 9px;border:1px solid var(--border);border-radius:var(--radius);background:#fff;color:var(--text);height:32px}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:340px}
.search-wrap input{width:100%;padding-left:30px;height:32px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:#fff}
.search-wrap input:focus{outline:none;border-color:#888}
.search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:var(--radius);z-index:200;max-height:240px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.sr-item{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border)}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--bg2)}
.sr-item .code{font-weight:600;font-size:12px;margin-right:8px}
.sr-item .desc{font-size:12px;color:var(--muted)}
.sr-item .cat{float:right;font-size:11px;color:#aaa;background:var(--bg3);padding:1px 6px;border-radius:4px}
.sheet-tabs{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.sheet-tab{font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;background:#fff;color:var(--muted);user-select:none}
.sheet-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.add-sheet-btn{font-size:12px;padding:4px 10px;border:1px dashed var(--border);border-radius:20px;cursor:pointer;color:var(--muted);background:transparent}
.add-sheet-btn:hover{color:var(--text);border-color:var(--text)}
.takeoff-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);background:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:6px 8px;background:var(--bg2);border-bottom:1px solid var(--border);font-weight:500;font-size:11px;color:var(--muted);white-space:nowrap;position:sticky;top:0}
td{padding:3px 6px;border-bottom:1px solid #f0efeb;vertical-align:middle}
tr:hover td{background:#fafaf8}
td.num{text-align:right;font-variant-numeric:tabular-nums;font-size:12px;color:var(--muted)}
.qty-input{width:72px;font-size:13px;padding:3px 7px;border:1px solid #ddd;border-radius:5px;background:var(--amber-bg);color:var(--text);text-align:right}
.qty-input:focus{outline:none;border-color:var(--amber)}
.notes-input{width:100%;font-size:12px;padding:3px 6px;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--text)}
.notes-input:focus{outline:none;border-color:var(--border);background:#fff}
.del-btn{background:none;border:none;cursor:pointer;font-size:13px;color:#ccc;padding:0 4px;opacity:0;transition:opacity .1s}
tr:hover .del-btn{opacity:1}
.del-btn:hover{color:var(--danger)}
.desc-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--muted)}
.unit-badge{font-size:10px;color:var(--muted);background:var(--bg3);padding:1px 5px;border-radius:4px}
.inline-wrap{position:relative}
.inline-input{width:100%;font-size:12px;padding:3px 6px;border:1px solid transparent;border-radius:5px;background:transparent}
.inline-input:focus{outline:none;border-color:var(--border);background:var(--amber-bg)}
.inline-input.has-item{background:transparent;border-color:transparent}
.inline-input.has-item:focus{background:var(--amber-bg);border-color:var(--border)}
.inline-results{position:absolute;top:calc(100% + 2px);left:0;min-width:280px;background:#fff;border:1px solid var(--border);border-radius:var(--radius);z-index:300;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ir-item{padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border)}
.ir-item:last-child{border-bottom:none}
.ir-item:hover{background:var(--bg2)}
.ir-code{font-weight:600;font-size:11px;display:block}
.ir-desc{font-size:11px;color:var(--muted);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.totals-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:var(--radius)}
.metric label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.metric .val{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums}
.metric .val.green{color:var(--green)}
.metric .val.amber{color:var(--amber)}
.summary-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.summary-card th{background:var(--bg2)}
.summary-card td,.summary-card th{padding:7px 12px}
tr.subtotal-row td{background:var(--bg2);font-weight:500;border-top:1px solid var(--border)}
tr.grand-row td{font-weight:600;font-size:14px;border-top:2px solid var(--border)}
.grand-row .val-cell{color:var(--green)}
.settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.settings-grid{grid-template-columns:1fr}}
.settings-section{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.settings-section h3{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.field-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.field-row label{font-size:12px;color:var(--muted);min-width:140px}
.field-row input{flex:1;font-size:13px;padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg2);color:var(--text)}
.field-row input:focus{outline:none;border-color:#888;background:#fff}
.empty-msg{text-align:center;padding:32px;color:var(--muted);font-size:13px;font-style:italic}

/* Estimates panel */
.est-list{display:grid;gap:8px}
.est-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.est-card:hover{background:var(--bg2)}
.est-card .est-name{font-weight:500;font-size:14px}
.est-card .est-meta{font-size:12px;color:var(--muted);margin-top:2px}
.est-card .est-actions{margin-left:auto;display:flex;gap:6px}
.save-indicator{font-size:11px;color:var(--muted);transition:color .3s}
.save-indicator.saving{color:var(--amber)}
.save-indicator.saved{color:var(--green)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:24px;width:340px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px}
.modal input{width:100%;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px}
.modal input:focus{outline:none;border-color:#888}
.modal-actions{display:flex;justify-content:flex-end;gap:8px}
.toast{position:fixed;bottom:20px;right:20px;background:#1a1a18;color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;z-index:600;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
.row-num{font-size:11px;color:#bbb;min-width:22px;text-align:right}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">Deltec <span>Estimating</span></div>
  <div class="proj-fields">
    <input id="proj-name" placeholder="Project name" oninput="markDirty()"/>
    <input id="proj-client" placeholder="Client / GC" oninput="markDirty()"/>
    <input id="proj-num" placeholder="Estimate #" oninput="markDirty()"/>
  </div>
  <div class="topbar-actions">
    <span class="save-indicator" id="save-ind"></span>
    <button class="btn" onclick="showEstimates()">&#128193; Estimates</button>
    <button class="btn success" onclick="saveEstimate()">&#10003; Save</button>
    <button class="btn primary" onclick="newEstimate()">+ New</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="takeoff" onclick="switchTab('takeoff')">Takeoff</div>
  <div class="tab" data-tab="summary" onclick="switchTab('summary')">Summary</div>
  <div class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</div>
</div>

<!-- TAKEOFF PANE -->
<div class="pane active" id="pane-takeoff">
  <div class="toolbar">
    <div class="sheet-tabs" id="sheet-tabs"></div>
    <button class="add-sheet-btn" onclick="addSheet()">+ sheet</button>
  </div>
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">&#8981;</span>
      <input type="text" id="lib-search" placeholder="Search library to add item…" oninput="onLibSearch(this.value)" autocomplete="off"/>
      <div class="search-results" id="search-results" style="display:none"></div>
    </div>
    <select id="cat-filter" onchange="renderTakeoff()">
      <option value="">All categories</option>
    </select>
    <button class="btn" onclick="addBlankRow()">+ blank row</button>
    <button class="btn danger sm" onclick="clearSheet()">Clear</button>
  </div>
  <div class="takeoff-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:26px">#</th>
          <th style="min-width:150px">Code / Item</th>
          <th style="min-width:180px">Description</th>
          <th style="width:44px">Unit</th>
          <th style="width:76px;text-align:right">QTY</th>
          <th style="width:80px;text-align:right">Mat $/unit</th>
          <th style="width:88px;text-align:right">Mat total</th>
          <th style="width:68px;text-align:right">Lab hrs</th>
          <th style="width:88px;text-align:right">Lab $</th>
          <th style="min-width:130px">Notes</th>
          <th style="width:24px"></th>
        </tr>
      </thead>
      <tbody id="takeoff-body"></tbody>
    </table>
  </div>
  <div class="totals-bar" id="sheet-totals"></div>
</div>

<!-- SUMMARY PANE -->
<div class="pane" id="pane-summary">
  <div class="summary-card">
    <table>
      <thead><tr>
        <th>Sheet</th>
        <th style="text-align:right">Raw mat</th>
        <th style="text-align:right">Labour $</th>
        <th style="text-align:right">Lab hrs</th>
        <th style="text-align:right">Mat w/mkp</th>
        <th style="text-align:right">Overhead</th>
        <th style="text-align:right">Profit</th>
        <th style="text-align:right">Subtotal</th>
      </tr></thead>
      <tbody id="summary-body"></tbody>
      <tfoot id="summary-foot"></tfoot>
    </table>
  </div>
  <div style="max-width:400px">
    <div class="summary-card">
      <table>
        <tbody id="grand-total-body"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- SETTINGS PANE -->
<div class="pane" id="pane-settings">
  <div class="settings-grid">
    <div class="settings-section">
      <h3>Labour rates</h3>
      <div class="field-row"><label>JM rate ($/hr)</label><input type="number" id="s-jm" value="115" oninput="refreshAll()"/></div>
      <div class="field-row"><label>Apprentice rate ($/hr)</label><input type="number" id="s-app" value="72" oninput="refreshAll()"/></div>
    </div>
    <div class="settings-section">
      <h3>Markups &amp; taxes</h3>
      <div class="field-row"><label>Material markup %</label><input type="number" id="s-matmkp" value="10" oninput="refreshAll()"/></div>
      <div class="field-row"><label>Overhead %</label><input type="number" id="s-oh" value="15" oninput="refreshAll()"/></div>
      <div class="field-row"><label>Profit %</label><input type="number" id="s-profit" value="10" oninput="refreshAll()"/></div>
      <div class="field-row"><label>Contingency %</label><input type="number" id="s-cont" value="0" oninput="refreshAll()"/></div>
      <div class="field-row"><label>GST %</label><input type="number" id="s-gst" value="5" oninput="refreshAll()"/></div>
      <div class="field-row"><label>PST %</label><input type="number" id="s-pst" value="7" oninput="refreshAll()"/></div>
    </div>
  </div>
</div>

<!-- ESTIMATES MODAL -->
<div class="modal-overlay" id="est-modal" style="display:none" onclick="if(event.target===this)hideEstimates()">
  <div class="modal" style="width:480px;max-height:80vh;overflow-y:auto">
    <h3>Saved estimates</h3>
    <div id="est-list-container"><div class="empty-msg">No saved estimates yet.</div></div>
    <div style="margin-top:16px;display:flex;justify-content:flex-end">
      <button class="btn" onclick="hideEstimates()">Close</button>
    </div>
  </div>
</div>

<!-- SAVE NAME MODAL -->
<div class="modal-overlay" id="name-modal" style="display:none">
  <div class="modal">
    <h3>Save estimate</h3>
    <input type="text" id="est-name-input" placeholder="Estimate name…"/>
    <div class="modal-actions">
      <button class="btn" onclick="document.getElementById('name-modal').style.display='none'">Cancel</button>
      <button class="btn primary" onclick="confirmSave()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

const CATS = [...new Set(LIBRARY.map(i=>i.category))].sort();

let state = {
  id: null,
  sheets: [{id:1, name:'Sheet 1', rows:[]}],
  activeSheet: 0,
  nextSheetId: 2,
  settings: {jm:115,app:72,matMkp:10,oh:15,profit:10,cont:0,gst:5,pst:7}
};

let dirty = false;
let saveTimeout = null;

function markDirty(){
  dirty = true;
  setInd('saving','Unsaved');
}

function setInd(cls, text){
  const el = document.getElementById('save-ind');
  el.className = 'save-indicator '+cls;
  el.textContent = text;
}

function $(id){return document.getElementById(id)}

function getSettings(){
  return {
    jm: parseFloat($('s-jm').value)||115,
    matMkp: (parseFloat($('s-matmkp').value)||10)/100,
    oh: (parseFloat($('s-oh').value)||15)/100,
    profit: (parseFloat($('s-profit').value)||10)/100,
    cont: (parseFloat($('s-cont').value)||0)/100,
    gst: (parseFloat($('s-gst').value)||5)/100,
    pst: (parseFloat($('s-pst').value)||7)/100
  };
}

function calcRow(row){
  const s = getSettings();
  const qty = parseFloat(row.qty)||0;
  const mat = qty*(parseFloat(row.mat_unit)||0);
  const hrs = qty*(parseFloat(row.labour_unit)||0);
  const lab = hrs*s.jm;
  return {mat, hrs, lab};
}

function sheetTotals(sheet){
  let rawMat=0,rawLab=0,labHrs=0;
  (sheet.rows||[]).forEach(r=>{
    const c=calcRow(r);
    rawMat+=c.mat; rawLab+=c.lab; labHrs+=c.hrs;
  });
  const s=getSettings();
  const matMkp=rawMat*(1+s.matMkp);
  const oh=(matMkp+rawLab)*s.oh;
  const profit=(matMkp+rawLab+oh)*s.profit;
  const cont=(matMkp+rawLab+oh+profit)*s.cont;
  const sub=matMkp+rawLab+oh+profit+cont;
  const gst=sub*s.gst;
  const pst=sub*s.pst;
  return {rawMat,rawLab,labHrs,matMkp,oh,profit,cont,sub,gst,pst,total:sub+gst+pst};
}

function fmt(n,dec=2){return '$'+(n||0).toLocaleString('en-CA',{minimumFractionDigits:dec,maximumFractionDigits:dec})}
function fmtH(n){return (n||0).toFixed(2)+'h'}

// --- Sheet tabs ---
function renderSheetTabs(){
  const el = $('sheet-tabs');
  el.innerHTML = state.sheets.map((sh,i)=>
    `<div class="sheet-tab ${i===state.activeSheet?'active':''}" onclick="switchSheet(${i})">${sh.name}</div>`
  ).join('');
}

function renderCatFilter(){
  const el = $('cat-filter');
  const cur = el.value;
  el.innerHTML = '<option value="">All categories</option>'+CATS.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

function switchSheet(i){
  state.activeSheet=i;
  renderSheetTabs();
  renderTakeoff();
}

function addSheet(){
  const n = 'Sheet '+state.nextSheetId++;
  state.sheets.push({id:state.nextSheetId, name:n, rows:[]});
  state.activeSheet=state.sheets.length-1;
  renderSheetTabs();
  renderTakeoff();
  markDirty();
}

function clearSheet(){
  if(!confirm('Clear all rows on this sheet?')) return;
  state.sheets[state.activeSheet].rows=[];
  renderTakeoff();
  refreshAll();
  markDirty();
}

function addBlankRow(){
  state.sheets[state.activeSheet].rows.push({code:'',description:'',unit:'',mat_unit:0,labour_unit:0,qty:'',notes:'',category:''});
  renderTakeoff();
  markDirty();
}

function addRowFromLib(item){
  state.sheets[state.activeSheet].rows.push({...item, qty:''});
  $('lib-search').value='';
  $('search-results').style.display='none';
  renderTakeoff();
  refreshAll();
  markDirty();
}

function deleteRow(idx){
  state.sheets[state.activeSheet].rows.splice(idx,1);
  renderTakeoff();
  refreshAll();
  markDirty();
}

// --- Library search ---
function onLibSearch(q){
  if(!q.trim()){$('search-results').style.display='none';return;}
  const lo=q.toLowerCase();
  const res=LIBRARY.filter(i=>i.code.toLowerCase().includes(lo)||i.description.toLowerCase().includes(lo)||i.category.toLowerCase().includes(lo)).slice(0,14);
  const el=$('search-results');
  if(!res.length){el.style.display='none';return;}
  el.innerHTML=res.map(i=>
    `<div class="sr-item" onclick="addRowFromLib(LIBRARY.find(x=>x.code==='${i.code.replace(/'/g,"\\'")}'))">
      <span class="cat">${i.category}</span><span class="code">${i.code}</span><span class="desc">${i.description}</span>
    </div>`
  ).join('');
  el.style.display='block';
}

function inlineSearch(idx, q){
  const container = $('ir-'+idx);
  if(!q.trim()){container.innerHTML='';return;}
  const lo=q.toLowerCase();
  const cf=$('cat-filter').value;
  const res=LIBRARY.filter(i=>(!cf||i.category===cf)&&(i.code.toLowerCase().includes(lo)||i.description.toLowerCase().includes(lo))).slice(0,8);
  container.innerHTML=res.map(i=>
    `<div class="ir-item" onclick="selectInline(${idx},'${i.code.replace(/'/g,"\\'")}')">
      <span class="ir-code">${i.code}</span>
      <span class="ir-desc">${i.description}</span>
    </div>`
  ).join('');
}

function selectInline(idx, code){
  const item=LIBRARY.find(x=>x.code===code);
  if(!item) return;
  Object.assign(state.sheets[state.activeSheet].rows[idx], item);
  const inp = $('ii-'+idx);
  if(inp){inp.value=item.code; inp.classList.add('has-item');}
  const res=$('ir-'+idx);
  if(res) res.innerHTML='';
  renderTakeoff();
  refreshAll();
  markDirty();
}

function updateQty(idx, val){
  state.sheets[state.activeSheet].rows[idx].qty=val;
  refreshAll();
  markDirty();
}

function updateNotes(idx, val){
  state.sheets[state.activeSheet].rows[idx].notes=val;
  markDirty();
}

// --- Render takeoff table ---
function renderTakeoff(){
  const sheet=state.sheets[state.activeSheet];
  const cf=$('cat-filter').value;
  const body=$('takeoff-body');
  if(!sheet.rows.length){
    body.innerHTML=`<tr><td colspan="11" class="empty-msg">Search the library above or use "+ blank row" to start adding items.</td></tr>`;
    renderTotalsBar();
    return;
  }
  body.innerHTML=sheet.rows.map((row,i)=>{
    const show=!cf||!row.category||row.category===cf;
    if(!show) return '';
    const c=calcRow(row);
    const hasItem=!!row.code;
    return `<tr>
      <td class="row-num">${i+1}</td>
      <td>
        <div class="inline-wrap">
          <input id="ii-${i}" class="inline-input${hasItem?' has-item':''}" type="text" value="${esc(row.code||'')}" placeholder="code or search…"
            oninput="inlineSearch(${i},this.value)" autocomplete="off"/>
          <div class="inline-results" id="ir-${i}"></div>
        </div>
      </td>
      <td class="desc-cell" title="${esc(row.description||'')}">${esc(row.description||'–')}</td>
      <td><span class="unit-badge">${esc(row.unit||'')}</span></td>
      <td><input class="qty-input" type="number" min="0" value="${row.qty||''}" placeholder="0"
        oninput="updateQty(${i},this.value)"/></td>
      <td class="num">${row.mat_unit?fmt(row.mat_unit,4):''}</td>
      <td class="num">${row.qty?fmt(c.mat):''}</td>
      <td class="num">${row.labour_unit?(row.labour_unit).toFixed(4):''}</td>
      <td class="num">${row.qty?fmt(c.lab):''}</td>
      <td><input class="notes-input" type="text" value="${esc(row.notes||'')}" placeholder="notes"
        oninput="updateNotes(${i},this.value)"/></td>
      <td><button class="del-btn" onclick="deleteRow(${i})">&#10005;</button></td>
    </tr>`;
  }).join('');
  renderTotalsBar();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderTotalsBar(){
  const t=sheetTotals(state.sheets[state.activeSheet]);
  $('sheet-totals').innerHTML=`
    <div class="metric"><label>Raw mat</label><div class="val">${fmt(t.rawMat)}</div></div>
    <div class="metric"><label>Labour</label><div class="val">${fmt(t.rawLab)}</div></div>
    <div class="metric"><label>Lab hrs</label><div class="val amber">${fmtH(t.labHrs)}</div></div>
    <div class="metric"><label>Mat w/mkp</label><div class="val">${fmt(t.matMkp)}</div></div>
    <div class="metric"><label>Overhead</label><div class="val">${fmt(t.oh)}</div></div>
    <div class="metric"><label>Profit</label><div class="val">${fmt(t.profit)}</div></div>
    <div class="metric"><label>Subtotal</label><div class="val">${fmt(t.sub)}</div></div>
    <div class="metric"><label>Total w/tax</label><div class="val green">${fmt(t.total)}</div></div>`;
}

function renderSummary(){
  const body=$('summary-body'), foot=$('summary-foot'), gt=$('grand-total-body');
  let tM=0,tL=0,tH=0,tMM=0,tO=0,tP=0,tS=0;
  body.innerHTML=state.sheets.map(sh=>{
    const t=sheetTotals(sh);
    tM+=t.rawMat;tL+=t.rawLab;tH+=t.labHrs;tMM+=t.matMkp;tO+=t.oh;tP+=t.profit;tS+=t.sub;
    return `<tr><td>${esc(sh.name)}</td>
      <td style="text-align:right">${fmt(t.rawMat)}</td><td style="text-align:right">${fmt(t.rawLab)}</td>
      <td style="text-align:right">${fmtH(t.labHrs)}</td><td style="text-align:right">${fmt(t.matMkp)}</td>
      <td style="text-align:right">${fmt(t.oh)}</td><td style="text-align:right">${fmt(t.profit)}</td>
      <td style="text-align:right">${fmt(t.sub)}</td></tr>`;
  }).join('');
  foot.innerHTML=`<tr class="subtotal-row"><td>All sheets</td>
    <td style="text-align:right">${fmt(tM)}</td><td style="text-align:right">${fmt(tL)}</td>
    <td style="text-align:right">${fmtH(tH)}</td><td style="text-align:right">${fmt(tMM)}</td>
    <td style="text-align:right">${fmt(tO)}</td><td style="text-align:right">${fmt(tP)}</td>
    <td style="text-align:right">${fmt(tS)}</td></tr>`;
  const s=getSettings();
  const gst=tS*s.gst, pst=tS*s.pst, grand=tS+gst+pst;
  gt.innerHTML=`
    <tr><td style="color:#888;font-size:12px;padding:8px 12px">Subtotal</td><td style="text-align:right;padding:8px 12px">${fmt(tS)}</td></tr>
    <tr><td style="color:#888;font-size:12px;padding:8px 12px">GST (${(s.gst*100).toFixed(0)}%)</td><td style="text-align:right;padding:8px 12px">${fmt(gst)}</td></tr>
    <tr><td style="color:#888;font-size:12px;padding:8px 12px">PST (${(s.pst*100).toFixed(0)}%)</td><td style="text-align:right;padding:8px 12px">${fmt(pst)}</td></tr>
    <tr class="grand-row"><td style="padding:10px 12px;font-weight:600">Grand total</td><td class="val-cell" style="text-align:right;padding:10px 12px;font-size:15px;color:#2d6b1f">${fmt(grand)}</td></tr>`;
}

function refreshAll(){
  renderTotalsBar();
  renderSummary();
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+name));
  if(name==='summary') renderSummary();
}

// --- Save / Load ---
function collectPayload(){
  return {
    id: state.id,
    name: $('proj-name').value||'Untitled',
    client: $('proj-client').value,
    estimateNum: $('proj-num').value,
    sheets: state.sheets,
    settings: {
      jm:$('s-jm').value, app:$('s-app').value,
      matMkp:$('s-matmkp').value, oh:$('s-oh').value,
      profit:$('s-profit').value, cont:$('s-cont').value,
      gst:$('s-gst').value, pst:$('s-pst').value
    },
    nextSheetId: state.nextSheetId
  };
}

async function saveEstimate(){
  const payload=collectPayload();
  if(!payload.name||payload.name==='Untitled'){
    $('est-name-input').value=payload.name;
    $('name-modal').style.display='flex';
    return;
  }
  await doSave(payload);
}

async function confirmSave(){
  const n=$('est-name-input').value.trim();
  if(!n) return;
  $('proj-name').value=n;
  $('name-modal').style.display='none';
  await doSave(collectPayload());
}

async function doSave(payload){
  setInd('saving','Saving…');
  try {
    const r=await fetch('/api/estimates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const d=await r.json();
    state.id=d.id;
    dirty=false;
    setInd('saved','Saved ✓');
    showToast('Estimate saved');
    setTimeout(()=>setInd('',''),3000);
  } catch(e){
    setInd('','');
    showToast('Save failed — check connection');
  }
}

async function showEstimates(){
  $('est-modal').style.display='flex';
  const container=$('est-list-container');
  container.innerHTML='<div class="empty-msg">Loading…</div>';
  try {
    const r=await fetch('/api/estimates');
    const list=await r.json();
    if(!list.length){container.innerHTML='<div class="empty-msg">No saved estimates yet.</div>';return;}
    container.innerHTML='<div class="est-list">'+list.map(e=>`
      <div class="est-card">
        <div>
          <div class="est-name">${esc(e.name)}</div>
          <div class="est-meta">${esc(e.client||'')}${e.estimateNum?' · #'+esc(e.estimateNum):''}${e.sheetCount?' · '+e.sheetCount+' sheet'+(e.sheetCount>1?'s':''):''} · ${new Date(e.updatedAt).toLocaleDateString('en-CA')}</div>
        </div>
        <div class="est-actions">
          <button class="btn sm" onclick="loadEstimate('${e.id}')">Open</button>
          <button class="btn sm danger" onclick="deleteEstimate('${e.id}',this)">Delete</button>
        </div>
      </div>`).join('')+'</div>';
  } catch(e){container.innerHTML='<div class="empty-msg">Could not load estimates.</div>';}
}

function hideEstimates(){$('est-modal').style.display='none';}

async function loadEstimate(id){
  try {
    const r=await fetch('/api/estimates/'+id);
    const d=await r.json();
    $('proj-name').value=d.name||'';
    $('proj-client').value=d.client||'';
    $('proj-num').value=d.estimateNum||'';
    state.sheets=d.sheets||[{id:1,name:'Sheet 1',rows:[]}];
    state.activeSheet=0;
    state.nextSheetId=d.nextSheetId||state.sheets.length+1;
    state.id=d.id;
    if(d.settings){
      $('s-jm').value=d.settings.jm||115;
      $('s-app').value=d.settings.app||72;
      $('s-matmkp').value=d.settings.matMkp||10;
      $('s-oh').value=d.settings.oh||15;
      $('s-profit').value=d.settings.profit||10;
      $('s-cont').value=d.settings.cont||0;
      $('s-gst').value=d.settings.gst||5;
      $('s-pst').value=d.settings.pst||7;
    }
    hideEstimates();
    renderSheetTabs();
    renderTakeoff();
    refreshAll();
    dirty=false;
    setInd('saved','Loaded ✓');
    setTimeout(()=>setInd('',''),2000);
  } catch(e){showToast('Could not load estimate');}
}

async function deleteEstimate(id, btn){
  if(!confirm('Delete this estimate?')) return;
  try {
    await fetch('/api/estimates/'+id,{method:'DELETE'});
    btn.closest('.est-card').remove();
    showToast('Deleted');
  } catch(e){showToast('Delete failed');}
}

function newEstimate(){
  if(dirty && !confirm('Unsaved changes will be lost. Continue?')) return;
  state={id:null,sheets:[{id:1,name:'Sheet 1',rows:[]}],activeSheet:0,nextSheetId:2};
  $('proj-name').value='';$('proj-client').value='';$('proj-num').value='';
  $('s-jm').value=115;$('s-app').value=72;$('s-matmkp').value=10;
  $('s-oh').value=15;$('s-profit').value=10;$('s-cont').value=0;
  $('s-gst').value=5;$('s-pst').value=7;
  dirty=false;setInd('','');
  renderSheetTabs();renderTakeoff();refreshAll();
}

function showToast(msg){
  const t=$('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-wrap')) $('search-results').style.display='none';
  if(!e.target.closest('.inline-wrap')) document.querySelectorAll('.inline-results').forEach(el=>el.innerHTML='');
});

// Warn before navigating away with unsaved changes
window.addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue='';}});

// Init
renderCatFilter();
renderSheetTabs();
renderTakeoff();
renderSummary();
</script>
</body>
</html>
